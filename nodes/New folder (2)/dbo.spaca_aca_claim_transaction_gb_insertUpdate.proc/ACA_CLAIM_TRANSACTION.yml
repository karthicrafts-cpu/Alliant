  name: ACA_CLAIM_TRANSACTION
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n--Update aca_current_flag - technically it should only update\
      \ the previous (current row) to 'N'\nUPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_TRANSACTION\
      \ AS T\nSET T.ACA_CURRENT_FLAG = STG.ACA_CURRENT_FLAG\n\t, T.ACA_UPDATE_USER\
      \ = CONCAT('SPACA_ACA_CLAIM_TRANSACTION_GB_INSERTUPDATE', ' - FLAG UPDATE')\n\
      \t, T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP()\nFROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_CLAIM_TRANSACTION_STAGING_GB') }} AS STG \nWHERE T.SOURCE_SYSTEM_CLAIM_ID\
      \ = STG.SOURCE_SYSTEM_CLAIM_ID\n\tAND T.ACA_SOURCE_SYSTEM_ID = STG.ACA_SOURCE_SYSTEM_ID\n\
      \tAND T.ACA_TRANSACTION_DATE = STG.ACA_TRANSACTION_DATE\n\tAND T.ACA_CURRENT_FLAG\
      \ <> STG.ACA_CURRENT_FLAG;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: false
