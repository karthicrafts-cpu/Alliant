  name: PSTG_SPACA_ACA_CLAIM_STAGING_ESIS_UPDATE
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    -- The original stored procedure used SQL Server's ENCRYPTBYKEY and Symmetric Keys.\n    -- This logic must be replaced with a suitable Snowflake encryption mechanism,\n    -- such as a UDF that uses ENCRYPT/DECRYPT and Snowflake's key management features.\n    -- A placeholder UDF named `UDF_ENCRYPTBYKEY` is used below to represent this logic.\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_STAGING_ESIS AS TGT\n    SET\n        TGT.aca_source_system_id = SOURCE.aca_source_system_id_val,\n        TGT.aca_account_structure_id = COALESCE(SOURCE.new_aca_account_structure_id, -1),\n        TGT.aca_date_id_claim_date = COALESCE(TRY_CAST(TO_VARCHAR(TGT.claim_date, 'YYYYMMDD') AS INT), -1),\n        TGT.aca_date_id_original_open_date = COALESCE(TRY_CAST(TO_VARCHAR(TGT.original_open_date, 'YYYYMMDD') AS INT), -1),\n        TGT.employee_identification_number_encrypted = COALESCE(TGT.employee_identification_number_encrypted, UDF_ENCRYPTBYKEY(TGT.employee_identification_number)),\n\
      \        TGT.employer_federal_tax_identification_number_encrypted =  COALESCE(TGT.employer_federal_tax_identification_number_encrypted, UDF_ENCRYPTBYKEY(TGT.employer_federal_tax_identification_number)),\n        TGT.death_date_encrypted =  COALESCE(TGT.death_date_encrypted , UDF_ENCRYPTBYKEY(CAST(TGT.death_date AS VARCHAR(25)))),\n        TGT.employee_identification_number = NULL,\n        TGT.employer_federal_tax_identification_number = NULL,\n        TGT.death_date = NULL,\n        TGT.aca_date_updated = CURRENT_TIMESTAMP(),\n        TGT.aca_update_user = 'spaca_aca_claim_staging_esis_update'\n    FROM (\n        SELECT\n            e.ACA_CLAIM_STAGING_ESIS_ID,\n            ac.aca_account_structure_id as new_aca_account_structure_id,\n            ss.aca_source_system_id as aca_source_system_id_val\n        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_STAGING_ESIS e\n        CROSS JOIN (SELECT aca_source_system_id FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE source_system\
      \ = 'ESIS') ss\n        LEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE ac\n            ON e.source_system_account_structure_id = ac.source_system_account_structure_id\n           AND ac.aca_source_system_id = ss.aca_source_system_id\n    ) AS SOURCE\n    WHERE TGT.ACA_CLAIM_STAGING_ESIS_ID = SOURCE.ACA_CLAIM_STAGING_ESIS_ID;\nEND;"
    testsEnabled: true
    truncateBefore: false
