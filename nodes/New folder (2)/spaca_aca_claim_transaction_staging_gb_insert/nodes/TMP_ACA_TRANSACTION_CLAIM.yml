      join:
        joinCondition: "FROM {{ ref('SRC-ASTRUS', 'ACA_TRANSACTION_CLAIM') }} AS ATC\nINNER JOIN (\n    SELECT ACA_TRANSACTION_CLAIM_ID, \n           ROW_NUMBER() OVER (PARTITION BY UNIQUE_CLAIM_ID, TRANSACTION_DATE ORDER BY STATUS_DATE DESC, ACA_TRANSACTION_CLAIM_ID DESC) AS ROW_NUM_SEQ\n    FROM {{ ref('ALLIANT_CLref('SRC-ASTRUS', 'ACA_TRANSACTION_CLAIM') }}\n    WHERE ACA_DATE_UPDATED > IFF(COALESCE({{ parameters.IBYPASSDATEFILTERS }}, 0) = 1, '1900-01-01 00:00:00.000'::TIMESTAMP_NTZ, (SELECT COALESCE(MAX(ACA_DATE_UPDATED), '1776-07-04 00:00:00.000'::TIMESTAMP_NTZ) FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION') }} WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')))\n    AND TRANSACTION_DATE > IFF(COALESCE({{ parameters.IBYPASSDATEFILTERS }}, 0) = 1, '1900-01-01'::DATE, (SELECT TRANSACTION_DATE FROM {{ ref('SRC-ASTRUS', 'V_ACA_TRANSACTION_DATE_CURRENT') }} WHERE ACA_SOURCE_SYSTEM_ID\
          \ = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM')E_SYSTEM = 'GB')))\n) AS ATC_RNUM ON ATC.ACA_TRANSACTION_CLAIM_ID = ATC_RNUM.ACA_TRANSACTION_CLAIM_ID\nWHERE ATC_RNUM.ROW_NUM_SEQ = 1"
