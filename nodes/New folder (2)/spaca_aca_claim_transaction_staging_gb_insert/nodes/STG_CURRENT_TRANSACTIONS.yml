    sourceMapping:
    - aliases:
        CT: CT
      customSQL:
        customSQL: ''
      dependencies:
      - locationName: SRC-ASTRUS
        nodeName: ACA_CLAIM_TRANSACTION
      - locationName: ASTRUS-REFINED
        nodeName: TMP_ACA_TRANSACTION_CLAIM
      - locationName: SRC-ASTRUS
        nodeName: ACA_SOURCE_SYSTEM
      join:
        joinCondition: "FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }} AS CT\nINNER JOIN (\n    SELECT DISTINCT UNIQUE_CLAIM_ID\n    FROM {{ ref('ASTRUS-REFINED', 'TMP_ACA_TRANSACTION_CLAIM') }}\n) AS T ON CT.SOURCE_SYSTEM_CLAIM_ID = T.UNIQUE_CLAIM_ID\n    AND CT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')\nINNER JOIN (\n    SELECT SOURCE_SYSTEM_CLAIM_ID, MAX(ACA_TRANSACTION_DATE) AS ACA_TRANSACTION_DATE\n    FROM {{ ref('ALLIANT_CLref('SRC-ASTRUS', 'ACA_CLAIM_TRANSACTION') }}\n    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM')         = 'GB')\n    GROUP BY SOURCE_SYSTEM_CLAIM_ID\n) AS ACT ON ACT.SOURCE_SYSTEM_CLAIM_ID = CT.SOURCE_SYSTEM_CLAIM_ID AND ACT.ACA_TRANSACTION_DATE = CT.ACA_TRANSACTION_DATE\nLEFT OUTER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB AS STG ON CT.SOURCE_SYSTEM_CLAIM_ID\
          \ = STG.SOURCE_SYSTEM_CLAIM_ID\n    AND CT.SOURCE_SYSTEM_TRANSACTION_DATE = STG.SOURCE_SYSTEM_TRANSACTION_DATE \nWHERE CT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCEref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM')')\n  AND STG.ACA_CLAIM_TRANSACTION_STAGING_GB_ID IS NULL"
      name: STG_CURRENT_TRANSACTIONS
      noLinkRefs: []
  overrideSQL: false
  schema: ASTRUS
  sqlType: Stage
  version: 1
