operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB AS TGT\n    SET \n        ACA_CLAIM_ID = SRC.NEW_ACA_CLAIM_ID,\n        ACA_CLAIMANT_ID = SRC.NEW_ACA_CLAIMANT_ID,\n        ACA_DATE_ID_TRANSACTION_DATE = SRC.NEW_ACA_DATE_ID_TRANSACTION_DATE,\n        ACA_DATE_ID_STATUS_DATE = SRC.NEW_ACA_DATE_ID_STATUS_DATE,\n        ACA_DATE_ID_REPORTED_DATE = SRC.NEW_ACA_DATE_ID_REPORTED_DATE,\n        ACA_DATE_ID_ACCIDENT_DATE = SRC.NEW_ACA_DATE_ID_ACCIDENT_DATE,\n        ACA_POLICY_ID = SRC.NEW_ACA_POLICY_ID,\n        ACA_CLAIM_ATTRIBUTE_ID = SRC.NEW_ACA_CLAIM_ATTRIBUTE_ID,\n        ACA_CURRENT_FLAG = SRC.NEW_ACA_CURRENT_FLAG,\n        ACA_TRANSACTION_DATE = SRC.SOURCE_SYSTEM_TRANSACTION_DATE,\n        MAX_TRANSACTION_DATE_PER_CLAIM = SRC.MAX_TRANSACTION_DATE_PER_CLAIM,\n        NEXT_TRANSACTION_DATE = SRC.NEXT_TRANSACTION_DATE,\n        ACA_ACCIDENT_SOURCE_CODE_ID = SRC.NEW_ACA_ACCIDENT_SOURCE_CODE_ID,\n        DESCRIPTION_OF_LOSS = NULL,\n        VEHICLE_IDENTIFICATION_NUMBER\
      \ = NULL,\n        CLAIMANT = NULL,\n        CLAIMANT_SSN = NULL,\n        ACA_SOURCE_SYSTEM_ID = SRC.NEW_ACA_SOURCE_SYSTEM_ID,\n        ACA_UPDATE_USER = 'spaca_aca_claim_transaction_staging_gb_update',\n        ACA_DATE_UPDATED = CURRENT_TIMESTAMP()\n    FROM (\n        SELECT\n            S.SOURCE_SYSTEM_CLAIM_ID,\n            S.SOURCE_SYSTEM_TRANSACTION_DATE,\n            IFNULL(CL.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,\n            IFNULL(C.ACA_CLAIMANT_ID, -1) AS NEW_ACA_CLAIMANT_ID,\n            IFNULL(TRY_CAST(TO_CHAR(S.SOURCE_SYSTEM_TRANSACTION_DATE, 'YYYYMMDD') AS INT), -1) AS NEW_ACA_DATE_ID_TRANSACTION_DATE,\n            IFNULL(TRY_CAST(TO_CHAR(S.STATUS_DATE, 'YYYYMMDD') AS INT), -1) AS NEW_ACA_DATE_ID_STATUS_DATE,\n            IFNULL(TRY_CAST(TO_CHAR(S.REPORTED_DATE, 'YYYYMMDD') AS INT), -1) AS NEW_ACA_DATE_ID_REPORTED_DATE,\n            IFNULL(TRY_CAST(TO_CHAR(S.ACCIDENT_DATE, 'YYYYMMDD') AS INT), -1) AS NEW_ACA_DATE_ID_ACCIDENT_DATE,\n            IFNULL(P.ACA_POLICY_ID,\
      \ -1) AS NEW_ACA_POLICY_ID,\n            IFNULL(CA.ACA_CLAIM_ATTRIBUTE_ID, -1) AS NEW_ACA_CLAIM_ATTRIBUTE_ID,\n            IFF(S.SOURCE_SYSTEM_TRANSACTION_DATE = MX.MAX_TRANSACTION_DATE_PER_CLAIM, 'Y' , 'N') AS NEW_ACA_CURRENT_FLAG,\n            MX.MAX_TRANSACTION_DATE_PER_CLAIM,\n            MX.NEXT_TRANSACTION_DATE,\n            IFNULL(ASCO.ACA_ACCIDENT_SOURCE_CODE_ID, -1) AS NEW_ACA_ACCIDENT_SOURCE_CODE_ID,\n            SRC_SYS.ACA_SOURCE_SYSTEM_ID AS NEW_ACA_SOURCE_SYSTEM_ID\n        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB S\n        CROSS JOIN (\n            SELECT ACA_SOURCE_SYSTEM_ID\n            FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\n            WHERE SOURCE_SYSTEM = 'GB'\n        ) SRC_SYS\n        INNER JOIN (\n            SELECT \n                SOURCE_SYSTEM_CLAIM_ID,\n                SOURCE_SYSTEM_TRANSACTION_DATE,\n                DATEADD(DAY, -1, LEAD(SOURCE_SYSTEM_TRANSACTION_DATE, 1) OVER (PARTITION BY SOURCE_SYSTEM_CLAIM_ID\
      \ ORDER BY SOURCE_SYSTEM_TRANSACTION_DATE ASC)) AS NEXT_TRANSACTION_DATE,\n                MAX(SOURCE_SYSTEM_TRANSACTION_DATE) OVER (PARTITION BY SOURCE_SYSTEM_CLAIM_ID) AS MAX_TRANSACTION_DATE_PER_CLAIM\n            FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CLAIM_TRANSACTION_STAGING_GB\n        ) MX ON S.SOURCE_SYSTEM_CLAIM_ID = MX.SOURCE_SYSTEM_CLAIM_ID\n             AND S.SOURCE_SYSTEM_TRANSACTION_DATE = MX.SOURCE_SYSTEM_TRANSACTION_DATE\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM CL ON S.SOURCE_SYSTEM_CLAIM_ID = CL.SOURCE_SYSTEM_CLAIM_ID AND CL.ACA_SOURCE_SYSTEM_ID = SRC_SYS.ACA_SOURCE_SYSTEM_ID\n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT C ON S.SOURCE_SYSTEM_CLAIMANT_ID = C.SOURCE_SYSTEM_CLAIMANT_ID \n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY P ON P.SOURCE_SYSTEM_POLICY_ID = S.SOURCE_SYSTEM_POLICY_ID \n        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM_ATTRIBUTE CA ON S.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID = CA.SOURCE_SYSTEM_CLAIM_ATTRIBUTE_ID\n\
      \        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_ACCIDENT_SOURCE_CODE ASCO ON ASCO.SOURCE_SYSTEM_ACCIDENT_SOURCE_CODE_ID = S.SOURCE_SYSTEM_ACCIDENT_SOURCE_CODE_ID\n    ) AS SRC\n    WHERE TGT.SOURCE_SYSTEM_CLAIM_ID = SRC.SOURCE_SYSTEM_CLAIM_ID\n      AND TGT.SOURCE_SYSTEM_TRANSACTION_DATE = SRC.SOURCE_SYSTEM_TRANSACTION_DATE;\nEND;"
    testsEnabled: true
    truncateBefore: false
