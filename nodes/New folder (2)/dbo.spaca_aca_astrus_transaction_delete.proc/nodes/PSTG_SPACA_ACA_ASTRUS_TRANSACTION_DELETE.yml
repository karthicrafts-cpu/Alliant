operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n  USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;\n\n  LET row_count NUMBER := (\n    SELECT COUNT(*)\n    FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_HEADER TH\n    INNER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING THS \n      ON TH.ACTIVITY_FROM_DATE = THS.ACTIVITY_FROM_DATE\n    LIMIT 1\n  );\n\n  IF (row_count > 0) THEN\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_HEADER AS TH\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TH.ACTIVITY_FROM_DATE = THS.ACTIVITY_FROM_DATE;\n\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_CLAIM AS TC\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TC.TRANSACTION_DATE = THS.ACTIVITY_FROM_DATE;\n\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_EXCESS AS TC\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TC.EXCESS_TRANSACTION_DATE = THS.ACTIVITY_FROM_DATE;\n\
      \n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_EXPERIENCE AS TC\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TC.EXPERIENCE_TRANSACTION_DATE = THS.ACTIVITY_FROM_DATE;\n\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_PAYMENT AS TC\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TC.PAYMENT_TRANSACTION_DATE = THS.ACTIVITY_FROM_DATE;\n\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_TRANSACTION_THIRD_PARTY_RECOVERY AS TC\n    USING ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_HEADER_STAGING AS THS\n    WHERE TC.THIRD_PARTY_RECOVERY_TRANSACTION_DATE = THS.ACTIVITY_FROM_DATE;\n  END IF;\nEND;"
    testsEnabled: true
    truncateBefore: false
