operation:
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_CLAIMS_ASTRUS;\n\nUPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS AC\nSET AC.DELETED_DATE = SOURCE.NEW_DELETED_DATE,\n    AC.DELETED_FLAG = SOURCE.NEW_DELETED_FLAG,\n    AC.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER,\n    AC.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED\nFROM (\n    SELECT \n        AC.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_1,\n        AC.ACA_SOURCE_SYSTEM_ID AS JOIN_KEY_2,\n        EDC.DELETE_DATE AS NEW_DELETED_DATE,\n        'Y' AS NEW_DELETED_FLAG,\n        'spaca_aca_claim_esis_update_deleted_flag' AS NEW_ACA_UPDATE_USER,\n        CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED\n    FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS AC\n    INNER JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_DELETED_CLAIM_STAGING_ESIS AS EDC\n        ON AC.SOURCE_SYSTEM_CLAIM_ID = EDC.SOURCE_SYSTEM_CLAIM_ID \n        AND AC.ACA_SOURCE_SYSTEM_ID = EDC.ACA_SOURCE_SYSTEM_ID\n) AS SOURCE\nWHERE AC.SOURCE_SYSTEM_CLAIM_ID = SOURCE.JOIN_KEY_1 \n  AND AC.ACA_SOURCE_SYSTEM_ID\
      \ = SOURCE.JOIN_KEY_2;\nEND;"
    testsEnabled: true
    truncateBefore: false
