    sourceMapping:
      - aliases:
          C: 3873c208-fccc-418e-9d6d-957be5dc1e15
          T: 2d078752-e34f-4131-9b72-88927c404c4d
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: SRC-ASTRUS
            nodeName: ACA_CLAIM
          - locationName: SRC-ASTRUS
            nodeName: ACA_RECOVERY_TRANSACTION
          - locationName: SRC-ASTRUS
            nodeName: ACA_RESERVE_TYPE
        join:
          joinCondition: |-
            FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} C
            INNER JOIN (
                SELECT ACA_RESERVE_TYPE.ACA_RESERVE_TYPE_ID, 
                       ACA_RESERVE_TYPE.ACA_SOURCE_SYSTEM_ID, 
                       COALESCE(RESERVE_TYPE, TRANSACTION_GROUP) AS RESERVE_TYPE
                FROM {{ ref('SRC-ASTRUS', 'ACA_RESERVE_TYPE') }} 
                GROUP BY ACA_RESERVE_TYPE_ID, ACA_SOURCE_SYSTEM_ID, COALESCE(RESERVE_TYPE, TRANSACTION_GROUP)
            ) M
                ON M.ACA_SOURCE_SYSTEM_ID = C.ACA_SOURCE_SYSTEM_ID
            LEFT JOIN {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION') }} T
                ON T.ACA_CLAIM_ID = C.ACA_CLAIM_ID
                AND T.ACA_RESERVE_TYPE_ID = M.ACA_RESERVE_TYPE_ID
            CROSS JOIN (
                SELECT MAX(ACA_RECOVERY_TRANSACTION_ID) AS ACA_RECOVERY_TRANSACTION_ID
                FROM {{ ref('SRC-ASTRUS', 'ACA_RECOVERY_TRANSACTION') }}
            ) I
            WHERE T.ACA_CLAIM_ID IS NULL 
              AND (C.DELETED_FLAG = 'N' OR C.DELETED_FLAG IS NULL)
        name: STG_ACA_CLAIM_RECOVERY
        noLinkRefs: []
