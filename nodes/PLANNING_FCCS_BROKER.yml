operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE PLANNING_ALLIANT;
      -- Do the Updates
      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS PB
      SET
          PB.BROKER_NAME = PBS.BROKER_NAME,
          PB.PLANNING_ALIAS = PBS.PLANNING_ALIAS,
          PB.BROKER_STATUS_INDICATOR = 'U',
          PB.DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          PB.DW_UPDATE_USER = 'sppa_planning_fccs_broker_insertUpdate'
      FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER_STAGING') }} AS PBS
      WHERE PB.PLANNING_ID = PBS.PLANNING_ID
        AND PBS.BROKER_STATUS_INDICATOR = 'U';
      -- Update current_flag to 'Y'
      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS PB
      SET
          CURRENT_FLAG = 'Y',
          DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          DW_UPDATE_USER = 'sppa_planning_fccs_broker_insertUpdate'
      FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER_STAGING') }} AS STG
      WHERE PB.PLANNING_ID = STG.PLANNING_ID
        AND IFNULL(PB.CURRENT_FLAG, '') <> 'Y';
      END;
    preSQL: |-
      BEGIN
      USE DATABASE PLANNING_ALLIANT;
      -- First set status to NULL
      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER
      SET BROKER_STATUS_INDICATOR = NULL
      WHERE BROKER_STATUS_INDICATOR IS NOT NULL;
      -- Set current_flag to 'N' for records that no longer exist in staging
      UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS PB
      SET
          CURRENT_FLAG = 'N',
          DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
          DW_UPDATE_USER = 'sppa_planning_fccs_broker_insertUpdate'
      WHERE
          IFNULL(PB.CURRENT_FLAG, 'Y') = 'Y'
          AND NOT EXISTS (
              SELECT 1
              FROM {{ ref('DBSHIFT', 'PLANNING_FCCS_BROKER_STAGING') }} AS STG
              WHERE STG.PLANNING_ID = PB.PLANNING_ID
          );
      END;
    testsEnabled: true
    truncateBefore: false
