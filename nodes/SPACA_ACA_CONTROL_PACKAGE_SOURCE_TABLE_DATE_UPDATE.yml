operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
        LET var VARCHAR;
        LET isourcegroupid NUMBER := {{ parameters.ISOURCEGROUPID }};

        SELECT 'BEGIN ' || COALESCE(LISTAGG(
            'UPDATE ' || COALESCE(DATABASE_NAME, '') || '.' || COALESCE(SCHEMA_NAME, '') || '.' || COALESCE(TABLE_NAME, '') || ' AS t ' ||
            'SET t.' || COALESCE(DATE_COLUMN, '') || ' = b.new_col ' ||
            'FROM ( SELECT ' || COALESCE(TABLE_NAME, '') || '_ID AS join_key, ' || COALESCE(DATE_COLUMN, '') || ' AS new_col ' ||
            'FROM ' || COALESCE(DATABASE_NAME, '') || '.' || COALESCE(SCHEMA_NAME, '') || '.' || COALESCE(TABLE_NAME, '') || COALESCE(BACKUP_TABLE_NAME_POSTFIX, '') || ' ) AS b ' ||
            'WHERE t.' || COALESCE(TABLE_NAME, '') || '_ID = b.join_key;',
            ' '
        ), '') || ' END;'
        INTO :var
        FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO', 'ACA_CONTROL_PACKAGE_SOURCE_TABLE') }}
        WHERE SOURCE_GROUP_ID = :isourcegroupid;

        IF (:var IS NOT NULL AND :var != 'BEGIN  END;') THEN
          EXECUTE IMMEDIATE :var;
        END IF;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
