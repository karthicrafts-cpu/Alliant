        join:
          joinCondition: |-
            FROM {{ ref('DBSHIFT', 'TMP_DW_POLICY') }} DWP
            LEFT OUTER JOIN {{ ref('DBSHIFT', 'DW_POLICY') }} PHIST ON DWP.DW_CLIENT_ID = PHIST.DW_CLIENT_ID
                AND DWP.AO_CLAIM_EPIC_POLICY_NUMBER = PHIST.POLICY_NUMBER
                AND DWP.POLICY_YEAR = YEAR(PHIST.POLICY_EFFECTIVE_DATE)
            LEFT OUTER JOIN {{ ref('DBSHIFT', 'DW_POLICY_CURRENT') }} PC ON PHIST.DW_POLICY_ID = PC.DW_POLICY_ID
            WHERE DWP.DW_POLICY_ID IS NULL
            AND PHIST.DW_POLICY_ID IS NOT NULL
