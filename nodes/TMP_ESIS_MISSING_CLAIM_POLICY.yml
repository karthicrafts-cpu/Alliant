        join:
          joinCondition: |-
            FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM') }} AS C
            INNER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION') }} AS CT
              ON CT.ACA_CLAIM_ID = C.ACA_CLAIM_ID
            INNER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_POLICY') }} AS P
              ON P.ACA_POLICY_ID = CT.ACA_POLICY_ID
            WHERE CT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS))
            AND CT.ACA_CURRENT_FLAG = 'Y'
            AND CT.ACA_POLICY_ID <> -1
            AND C.SOURCE_SYSTEM_CLAIM_ID IN (
                SELECT DISTINCT SOURCE_SYSTEM_CLAIM_ID
                FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS
