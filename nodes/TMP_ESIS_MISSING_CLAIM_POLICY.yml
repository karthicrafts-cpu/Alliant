        join:
          joinCondition: |-
            FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM') }} AS C
            INNER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM_TRANSACTION') }} AS CT
              ON CT.ACA_CLAIM_ID = C.ACA_CLAIM_ID
            INNER JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_POLICY') }} AS P
              ON P.ACA_POLICY_ID = CT.ACA_POLICY_ID
