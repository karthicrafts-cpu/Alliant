operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS R
      SET
        R.SOURCE_SYSTEM_POLICY_ID = SOURCE.NEW_SOURCE_SYSTEM_POLICY_ID,
        R.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
        R.ACA_RESERVE_TYPE_ID = SOURCE.NEW_ACA_RESERVE_TYPE_ID,
        R.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
        R.SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID = SOURCE.NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,
        R.COVERAGE_GROUP_CODE = SOURCE.NEW_COVERAGE_GROUP_CODE,
        R.RESERVE_TYPE = SOURCE.NEW_RESERVE_TYPE,
        R.ACA_SOURCE_SYSTEM_ID = SOURCE.NEW_ACA_SOURCE_SYSTEM_ID,
        R.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED,
        R.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER
      FROM (
        SELECT
          R_INNER.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_1,
          R_INNER.RECOVERY_TRANSACTION_DATE AS JOIN_KEY_2,
          R_INNER.TRANSACTION_SEQUENCE_NUMBER AS JOIN_KEY_3,
          COALESCE(R_INNER.SOURCE_SYSTEM_POLICY_ID, MC.SOURCE_SYSTEM_POLICY_ID) AS NEW_SOURCE_SYSTEM_POLICY_ID,
          COALESCE(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
          COALESCE(RT.ACA_RESERVE_TYPE_ID, -1) AS NEW_ACA_RESERVE_TYPE_ID,
          COALESCE(R_INNER.ACA_POLICY_ID, PO.ACA_POLICY_ID, MC.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID,
          MD5_BINARY(CONCAT('<row unique_claim_id="', COALESCE(TO_VARCHAR(R_INNER.SOURCE_SYSTEM_CLAIM_ID), ''), '" recovery_transaction_date="', COALESCE(TO_VARCHAR(R_INNER.RECOVERY_TRANSACTION_DATE), ''), '" transaction_sequence_number="', COALESCE(TO_VARCHAR(R_INNER.TRANSACTION_SEQUENCE_NUMBER), ''), '" reserve_type="', COALESCE(TO_VARCHAR(RT.TRANSACTION_GROUP), ''), '" />')) AS NEW_SOURCE_SYSTEM_RECOVERY_TRANSACTION_ID,
          COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE) AS NEW_COVERAGE_GROUP_CODE,
          RT.TRANSACTION_GROUP AS NEW_RESERVE_TYPE,
          (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS)) AS NEW_ACA_SOURCE_SYSTEM_ID,
          CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED,
          'spaca_aca_recovery_transaction_staging_esis_update' AS NEW_ACA_UPDATE_USER
        FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS AS R_INNER
        LEFT JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_CLAIM') }} AS C
          ON C.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
        LEFT JOIN {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_POLICY') }} AS PO
          ON PO.SOURCE_SYSTEM_POLICY_ID = R_INNER.SOURCE_SYSTEM_POLICY_ID
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.TMP_ESIS_MISSING_CLAIM_POLICY AS MC
          ON MC.SOURCE_SYSTEM_CLAIM_ID = R_INNER.SOURCE_SYSTEM_CLAIM_ID
        LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_RESERVE_TYPE_MAPPING AS RT
          ON RT.PAYMENT_TYPE_CODE = R_INNER.PAYMENT_TYPE_CODE
          AND RT.COVERAGE_GROUP_CODE = COALESCE(R_INNER.COVERAGE_GROUP_CODE, MC.CLAIM_COVERAGE_CODE)
          AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_DBO', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = (SELECT MAX(SOURCE_SYSTEM) FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_RECOVERY_TRANSACTION_STAGING_ESIS))
      ) AS SOURCE
      WHERE EQUAL_NULL(R.SOURCE_SYSTEM_CLAIM_ID, SOURCE.JOIN_KEY_1)
        AND EQUAL_NULL(R.RECOVERY_TRANSACTION_DATE, SOURCE.JOIN_KEY_2)
        AND EQUAL_NULL(R.TRANSACTION_SEQUENCE_NUMBER, SOURCE.JOIN_KEY_3);
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
