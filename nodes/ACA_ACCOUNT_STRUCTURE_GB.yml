name: ACA_ACCOUNT_STRUCTURE_GB
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE_GB AS a
      SET 
           division_id = stg.division_id
          ,division_name = stg.division_name
          ,subsidiary_id = stg.subsidiary_id
          ,subsidiary_name = stg.subsidiary_name
          ,location_id = stg.location_id
          ,location_name = stg.location_name
          ,aca_date_updated = CURRENT_TIMESTAMP()
          ,aca_update_user = 'spaca_aca_account_structure_gb_insertUpdate'
      FROM {{ ref('DBSHIFT', 'ACA_ACCOUNT_STRUCTURE_STAGING_GB') }} AS stg
      WHERE a.source_system_account_structure_id = stg.source_system_account_structure_id
        AND a.aca_date_created <> CURRENT_TIMESTAMP()
        AND (
          IFNULL(stg.division_id, '-1') <> IFNULL(a.division_id, '-1')
          OR IFNULL(stg.division_name, '-1') <> IFNULL(a.division_name, '-1')
          OR IFNULL(stg.subsidiary_id, '-1') <> IFNULL(a.subsidiary_id, '-1')
          OR IFNULL(stg.subsidiary_name, '-1') <> IFNULL(a.subsidiary_name, '-1')
          OR IFNULL(stg.location_id, '-1') <> IFNULL(a.location_id, '-1')
          OR IFNULL(stg.location_name, '-1') <> IFNULL(a.location_name, '-1')
        );
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: false
