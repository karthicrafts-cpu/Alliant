operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      
          LET proc_name VARCHAR := 'SPACA_ACA_CONTROL_PACKAGE_DATE_UPDATE';
          LET current_timestamp TIMESTAMP := CURRENT_TIMESTAMP();
          LET controlPackageDateId NUMBER := {{ parameters.iControlPackageDateId }};
          LET recordProcessed NUMBER;
      
          SELECT SUM(inserted_record_count) INTO :recordProcessed
          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE_SOURCE_TABLE
          WHERE aca_control_package_date_id = :controlPackageDateId;
      
          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_DATE AS TGT
          SET TGT.processed_flag = 1,
              TGT.records_processed = :recordProcessed,
              TGT.aca_date_updated = :current_timestamp,
              TGT.aca_update_user = :proc_name
          WHERE TGT.aca_control_package_date_id = :controlPackageDateId;
      END;
    testsEnabled: true
    truncateBefore: false
