name: PLANNING_FCCS_CLIENT
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;

          -- DO THE UPDATES
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              PC.CLIENT_NAME = PCS.CLIENT_NAME,
              PC.PLANNING_ALIAS = PCS.PLANNING_ALIAS,
              PC.CLIENT_STATUS_INDICATOR = 'U',
              PC.DW_DATE_UPDATED = CURRENT_TIMESTAMP,
              PC.DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT_STAGING') }} AS PCS
          WHERE PC.PLANNING_ID = PCS.PLANNING_ID AND PCS.CLIENT_STATUS_INDICATOR = 'U';

          -- UPDATE CURRENT_FLAG TO 'Y'
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              CURRENT_FLAG = 'Y',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP,
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG
          WHERE PC.PLANNING_ID = STG.PLANNING_ID
            AND IFNULL(PC.CURRENT_FLAG, '') <> 'Y';
      END;
    preSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;

          -- FIRST SET STATUS TO NULL
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              PC.CLIENT_STATUS_INDICATOR = NULL
          WHERE PC.CLIENT_STATUS_INDICATOR IS NOT NULL;

          -- SET CURRENT_FLAG TO 'N'
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              CURRENT_FLAG = 'N',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP,
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          WHERE IFNULL(PC.CURRENT_FLAG, 'Y') = 'Y'
            AND NOT EXISTS (
              SELECT 1
              FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG
              WHERE STG.PLANNING_ID = PC.PLANNING_ID
            );
      END;
    testsEnabled: true
    truncateBefore: false
