name: PLANNING_FCCS_CLIENT
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;

      	-- Do the Updates
      	UPDATE	PC
      	SET		PC.CLIENT_NAME		= PCS.CLIENT_NAME
      			, PC.PLANNING_ALIAS	= PCS.PLANNING_ALIAS
      			, PC.CLIENT_STATUS_INDICATOR = 'U'
      			, PC.DW_DATE_UPDATED = CURRENT_TIMESTAMP()
      			, PC.DW_UPDATE_USER  = 'sppa_planning_fccs_client_insertUpdate'
      	FROM	PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
      	 INNER JOIN {{ ref('DBSHIFT', 'PLANNING_FCCS_CLIENT_STAGING') }} AS PCS  ON PC.PLANNING_ID = PCS.PLANNING_ID AND PCS.CLIENT_STATUS_INDICATOR = 'U';


      	-- Update current_flag to 'Y'
      	UPDATE	PC
      	SET		CURRENT_FLAG      = 'Y'
      			, DW_DATE_UPDATED = CURRENT_TIMESTAMP()
      			, DW_UPDATE_USER  = 'sppa_planning_fccs_client_insertUpdate'
      	FROM	PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
      	INNER JOIN {{ ref('DBSHIFT', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG ON PC.PLANNING_ID = STG.PLANNING_ID
      	AND		IFNULL(PC.CURRENT_FLAG, '') <> 'Y';

      END;
    preSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;

      	-- First set status to NULL
      	UPDATE	PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT
      	SET		CLIENT_STATUS_INDICATOR = NULL
      	WHERE CLIENT_STATUS_INDICATOR IS NOT NULL;

      	
      	-- Set current_flag to 'N'
      	UPDATE	PC
      	SET		CURRENT_FLAG	  = 'N' 
      			, DW_DATE_UPDATED = CURRENT_TIMESTAMP()
      			, DW_UPDATE_USER  = 'sppa_planning_fccs_client_insertUpdate'
      	FROM	PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
      	LEFT JOIN {{ ref('DBSHIFT', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG ON PC.PLANNING_ID = STG.PLANNING_ID
      	WHERE	IFNULL(PC.CURRENT_FLAG, 'Y') = 'Y'
      	AND		STG.PLANNING_ID IS NULL;

      END;
    testsEnabled: true
    truncateBefore: false
