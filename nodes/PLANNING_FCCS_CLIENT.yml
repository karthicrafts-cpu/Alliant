name: PLANNING_FCCS_CLIENT
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;
      
          -- Update current_flag to 'Y' for records that are in staging
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              CURRENT_FLAG = 'Y',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG
          WHERE PC.PLANNING_ID = STG.PLANNING_ID
          AND IFNULL(PC.CURRENT_FLAG, '') <> 'Y';
      END;
    preSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;
      
          -- First set status to NULL
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET CLIENT_STATUS_INDICATOR = NULL
          WHERE CLIENT_STATUS_INDICATOR IS NOT NULL;
      
          -- Set current_flag to 'N' for records not in staging
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC
          SET
              CURRENT_FLAG = 'N',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_CLIENT_INSERTUPDATE'
          WHERE
              IFNULL(CURRENT_FLAG, 'Y') = 'Y'
          AND
              PC.PLANNING_ID NOT IN (SELECT STG.PLANNING_ID FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT_STAGING') }} AS STG WHERE STG.PLANNING_ID IS NOT NULL);
      END;
    testsEnabled: true
    truncateBefore: false
