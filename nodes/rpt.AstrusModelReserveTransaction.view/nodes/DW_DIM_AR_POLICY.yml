name: DW_DIM_AR_POLICY
operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    -- Soft-delete records that no longer exist in the source\n    UPDATE ALLIANT_DW.DIM.DW_DIM_AR_POLICY AS T\n    SET \n        DW_LOGICALLY_DELETED_DATETIME = CURRENT_TIMESTAMP(),\n        DW_UPDATE_TS = CURRENT_TIMESTAMP()\n    WHERE\n        NOT EXISTS (\n            SELECT 1\n            FROM {{ ref('DBSHIFT', 'RISKMASTER_EXTRACT_POLICY_ALL_RECS') }} AS S\n            WHERE \n                T.POLICY_NUMBER = S.POLICY_NUMBER AND\n                T.POLICY_SYMBOL = S.POLICY_SYMBOL AND\n                T.MODULE = S.MODULE\n        )\n        AND T.DW_LOGICALLY_DELETED_DATETIME IS NULL;\nEND;"
    preSQL: "BEGIN\n    UPDATE ALLIANT_DW.DIM.DW_DIM_AR_POLICY AS T\n    SET\n        MASTER_COMPANY = S.MASTER_COMPANY,\n        LOCATION = S.LOCATION,\n        POLICY_INSURANCE_LINE = S.POLICY_INSURANCE_LINE,\n        POLICY_EFFECTIVE_DATE = S.POLICY_EFFECTIVE_DATE,\n        POLICY_EXPIRATION_DATE = S.POLICY_EXPIRATION_DATE,\n        STATE = S.STATE,\n        POLICY_NAME = S.POLICY_NAME,\n        MASTER_COMPANY_NAME = S.MASTER_COMPANY_NAME,\n        DW_UPDATE_TS = CURRENT_TIMESTAMP()\n    FROM {{ ref('DBSHIFT', 'RISKMASTER_EXTRACT_POLICY_ALL_RECS') }} AS S\n    WHERE \n        T.POLICY_NUMBER = S.POLICY_NUMBER AND\n        T.POLICY_SYMBOL = S.POLICY_SYMBOL AND\n        T.MODULE = S.MODULE AND\n        T.DW_LOGICALLY_DELETED_DATETIME IS NULL AND\n        (\n            IFNULL(T.MASTER_COMPANY, '') <> IFNULL(S.MASTER_COMPANY, '') OR\n            IFNULL(T.LOCATION, '') <> IFNULL(S.LOCATION, '') OR\n            IFNULL(T.POLICY_INSURANCE_LINE, '') <> IFNULL(S.POLICY_INSURANCE_LINE, '') OR\n\
      \            IFNULL(T.POLICY_EFFECTIVE_DATE, '1900-01-01') <> IFNULL(S.POLICY_EFFECTIVE_DATE, '1900-01-01') OR\n            IFNULL(T.POLICY_EXPIRATION_DATE, '1900-01-01') <> IFNULL(S.POLICY_EXPIRATION_DATE, '1900-01-01') OR\n            IFNULL(T.STATE, '') <> IFNULL(S.STATE, '') OR\n            IFNULL(T.POLICY_NAME, '') <> IFNULL(S.POLICY_NAME, '') OR\n            IFNULL(T.MASTER_COMPANY_NAME, '') <> IFNULL(S.MASTER_COMPANY_NAME, '')\n        );\nEND;"
    testsEnabled: true
    truncateBefore: false
