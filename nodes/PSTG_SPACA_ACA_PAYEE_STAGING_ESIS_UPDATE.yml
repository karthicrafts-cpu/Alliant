name: PSTG_SPACA_ACA_PAYEE_STAGING_ESIS_UPDATE
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      
          UPDATE DBO.ACA_PAYEE_STAGING_ESIS AS p
          SET
              payee_encrypted = s.new_payee_encrypted,
              last_name_encrypted = s.new_last_name_encrypted,
              first_name_encrypted = s.new_first_name_encrypted,
              organization_encrypted = s.new_organization_encrypted,
              address_encrypted = s.new_address_encrypted,
              irs_tax_identification_number_encrypted = s.new_irs_tax_identification_number_encrypted,
              mail_to_encrypted = s.new_mail_to_encrypted,
              mail_to_last_name_encrypted = s.new_mail_to_last_name_encrypted,
              mail_to_first_name_encrypted = s.new_mail_to_first_name_encrypted,
              mail_to_organization_encrypted = s.new_mail_to_organization_encrypted,
              mail_to_address_encrypted = s.new_mail_to_address_encrypted,
              payee = NULL,
              last_name = NULL,
              first_name = NULL,
              organization = NULL,
              address = NULL,
              irs_tax_identification_number = NULL,
              mail_to = NULL,
              mail_to_last_name = NULL,
              mail_to_first_name = NULL,
              mail_to_organization = NULL,
              mail_to_address = NULL,
              aca_irs_form_1099_type_id = s.new_aca_irs_form_1099_type_id,
              irs_form_1099_type = s.new_irs_form_1099_type,
              aca_source_system_id = s.new_aca_source_system_id,
              aca_date_updated = CURRENT_TIMESTAMP(),
              aca_update_user = 'spaca_aca_payee_staging_esis_update'
          FROM (
              SELECT
                  p_inner.DW_ID, -- ASSUMED PRIMARY KEY
                  IFNULL(p_inner.payee_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.payee, 1, '123')) AS new_payee_encrypted,
                  IFNULL(p_inner.last_name_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.last_name, 1, '123')) AS new_last_name_encrypted,
                  IFNULL(p_inner.first_name_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.first_name, 1, '123')) AS new_first_name_encrypted,
                  IFNULL(p_inner.organization_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.organization, 1, '123')) AS new_organization_encrypted,
                  IFNULL(p_inner.address_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.address, 1, '123')) AS new_address_encrypted,
                  IFNULL(p_inner.irs_tax_identification_number_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.irs_tax_identification_number, 1, '123')) AS new_irs_tax_identification_number_encrypted,
                  IFNULL(p_inner.mail_to_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.mail_to, 1, '123')) AS new_mail_to_encrypted,
                  IFNULL(p_inner.mail_to_last_name_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.mail_to_last_name, 1, '123')) AS new_mail_to_last_name_encrypted,
                  IFNULL(p_inner.mail_to_first_name_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.mail_to_first_name, 1, '123')) AS new_mail_to_first_name_encrypted,
                  IFNULL(p_inner.mail_to_organization_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.mail_to_organization, 1, '123')) AS new_mail_to_organization_encrypted,
                  IFNULL(p_inner.mail_to_address_encrypted, ENCRYPTBYKEY(KEY_GUID('SymmetricKey1'), p_inner.mail_to_address, 1, '123')) AS new_mail_to_address_encrypted,
                  IFNULL(i.aca_irs_form_1099_type_id, -1) AS new_aca_irs_form_1099_type_id,
                  i.irs_form_1099_type AS new_irs_form_1099_type,
                  s.aca_source_system_id AS new_aca_source_system_id
              FROM DBO.ACA_PAYEE_STAGING_ESIS p_inner
              LEFT JOIN ALLIANT_CLAIMS_ASTRUS.REF.ACA_IRS_FORM_1099_TYPE AS i ON i.irs_form_1099_type_code = p_inner.irs_form_1099_type_code
              LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM AS s ON s.source_system = p_inner.source_system
          ) AS s
          WHERE p.DW_ID = s.DW_ID;
      END
