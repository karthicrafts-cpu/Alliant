    cteString: |-
      C AS (
          SELECT
              UNIQUE_CLAIM_ID,
              MIN(CAST(TO_VARCHAR(EXPERIENCE_TRANSACTION_DATE, 'YYYYMMDD') AS INT)) AS ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
          FROM {{ ref('DBSHIFT', 'ACA_TRANSACTION_EXPERIENCE') }}
          GROUP BY
              UNIQUE_CLAIM_ID
      )
    enabledColumnTestIDs: []
    sourceMapping:
      - aliases:
          ACA_EXPERIENCE_TRANSACTION: T
        customSQL:
          customSQL: ""
        dependencies:
          - locationName: DBSHIFT
            nodeName: ACA_EXPERIENCE_TRANSACTION
          - locationName: DBSHIFT
            nodeName: ACA_TRANSACTION_EXPERIENCE
          - locationName: DBSHIFT
            nodeName: ACA_COVERAGE_CODE
          - locationName: DBSHIFT
            nodeName: ACA_RESERVE_TYPE_MAPPING
          - locationName: DBSHIFT
            nodeName: ACA_SOURCE_SYSTEM
        join:
          joinCondition: |
            FROM {{ ref('DBSHIFT', 'ACA_EXPERIENCE_TRANSACTION') }} AS T
            INNER JOIN C ON C.UNIQUE_CLAIM_ID = T.SOURCE_SYSTEM_CLAIM_ID AND C.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE > T.ACA_DATE_ID_EXPERIENCE_TRANSACTION_DATE
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_COVERAGE_CODE') }} AS CC ON CC.CODE = T.COVERAGE_GROUP_CODE
            LEFT JOIN {{ ref('DBSHIFT', 'ACA_RESERVE_TYPE_MAPPING') }} AS RT ON RT.CLASS_CODE = CC.CLASS AND RT.RESERVE_TYPE = T.RESERVE_TYPE AND RT.ACA_SOURCE_SYSTEM_ID = T.ACA_SOURCE_SYSTEM_ID
            WHERE T.ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM {{ ref('DBSHIFT', 'ACA_SOURCE_SYSTEM') }} WHERE SOURCE_SYSTEM = 'GB')
            GROUP BY T.SOURCE_SYSTEM_CLAIM_ID, T.COVERAGE_GROUP_CODE
        name: V_TEMP_EXPERIENCE_EXISTING
        noLinkRefs: []
