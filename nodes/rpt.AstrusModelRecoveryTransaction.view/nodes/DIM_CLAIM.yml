name: DIM_CLAIM
operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    -- Soft-delete records that no longer exist in the source\n    UPDATE YOUR_DB.DW.DIM_CLAIM AS TGT\n    SET\n        TGT.DW_ROW_IS_CURRENT = 'N',\n        TGT.DW_DATE_DELETED = CURRENT_TIMESTAMP(),\n        TGT.DW_DATE_MODIFIED = CURRENT_TIMESTAMP()\n    WHERE TGT.DW_ROW_IS_CURRENT = 'Y'\n      AND NOT EXISTS (\n        SELECT 1\n        FROM {{ ref('DBSHIFT', 'STG_CLAIM') }} AS SRC\n        WHERE SRC.SOURCE_SYSTEM_CLAIM_ID = TGT.SOURCE_SYSTEM_CLAIM_ID\n      );\nEND;"
    preSQL: "BEGIN\n    -- Update attributes for existing, changed records\n    UPDATE YOUR_DB.DW.DIM_CLAIM AS TGT\n    SET\n        CLAIM_NUMBER = S.CLAIM_NUMBER,\n        POLICY_NUMBER = S.POLICY_NUMBER,\n        DW_ROW_HASH = S.DW_ROW_HASH,\n        DW_DATE_MODIFIED = CURRENT_TIMESTAMP()\n    FROM {{ ref('DBSHIFT', 'STG_CLAIM') }} AS S\n    WHERE\n        TGT.SOURCE_SYSTEM_CLAIM_ID = S.SOURCE_SYSTEM_CLAIM_ID\n        AND TGT.DW_ROW_IS_CURRENT = 'Y'\n        AND TGT.DW_ROW_HASH <> S.DW_ROW_HASH;\nEND;"
    testsEnabled: true
    truncateBefore: false
