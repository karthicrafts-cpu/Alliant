name: FCT_ACA_PAYMENT_TRANSACTION
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;
      DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_TRANSACTION
      WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE SOURCE_SYSTEM = 'GB')
      AND TRANSACTION_DATE IN (SELECT DISTINCT TRANSACTION_DATE FROM {{ ref('DBSHIFT', 'ACA_PAYMENT_TRANSACTION_STAGING_GB') }});
      DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYMENT_TRANSACTION
      WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM WHERE SOURCE_SYSTEM = 'ESIS')
      AND TRANSACTION_DATE IN (SELECT DISTINCT TRANSACTION_DATE FROM {{ ref('DBSHIFT', 'ACA_PAYMENT_TRANSACTION_STAGING_ESIS') }});
      END
    testsEnabled: true
    truncateBefore: true
