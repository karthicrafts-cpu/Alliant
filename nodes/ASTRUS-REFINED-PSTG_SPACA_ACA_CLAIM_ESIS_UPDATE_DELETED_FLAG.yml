operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN


      UPDATE  {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }} AS AC
      SET AC.DELETED_DATE = SOURCE.NEW_DELETED_DATE,
          AC.DELETED_FLAG = SOURCE.NEW_DELETED_FLAG,
          AC.ACA_UPDATE_USER = SOURCE.NEW_ACA_UPDATE_USER,
          AC.ACA_DATE_UPDATED = SOURCE.NEW_ACA_DATE_UPDATED
      FROM (
          SELECT 
              AC.SOURCE_SYSTEM_CLAIM_ID AS JOIN_KEY_1,
              AC.ACA_SOURCE_SYSTEM_ID AS JOIN_KEY_2,
              EDC.DELETE_DATE AS NEW_DELETED_DATE,
              'Y' AS NEW_DELETED_FLAG,
              'spaca_aca_claim_esis_update_deleted_flag' AS NEW_ACA_UPDATE_USER,
              CURRENT_TIMESTAMP() AS NEW_ACA_DATE_UPDATED
          FROM {{ ref('SRC-ASTRUS', 'ACA_CLAIM') }}AS AC
          INNER JOIN {{ ref('SRC-ASTRUS', 'ACA_DELETED_CLAIM_STAGING_ESIS') }} AS EDC
              ON AC.SOURCE_SYSTEM_CLAIM_ID = EDC.SOURCE_SYSTEM_CLAIM_ID 
              AND AC.ACA_SOURCE_SYSTEM_ID = EDC.ACA_SOURCE_SYSTEM_ID
      ) AS SOURCE
      WHERE AC.SOURCE_SYSTEM_CLAIM_ID = SOURCE.JOIN_KEY_1 
        AND AC.ACA_SOURCE_SYSTEM_ID = SOURCE.JOIN_KEY_2;
      END;
    testsEnabled: true
    truncateBefore: false
