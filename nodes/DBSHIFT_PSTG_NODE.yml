operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_CLAIM_STAGING
          SET
              UNIQUE_CLAIM_ID = CONCAT(CLIENT_NUMBER, '-', ACCIDENT_NUMBER, '-', CLAIM_COVERAGE_CODE, '-', CLAIM_SEQUENCE_NUMBER),
              TRANSACTION_DATE = TRY_CAST(NULLIF(TRIM(TRANSACTION_YEAR), '') || NULLIF(TRIM(TRANSACTION_MONTH), '') || NULLIF(TRIM(TRANSACTION_DAY), '') AS DATE),
              POLICY_EFFECTIVE_DATE = TRY_CAST(NULLIF(TRIM(POLICY_EFFECTIVE_YEAR), '') || NULLIF(TRIM(POLICY_EFFECTIVE_MONTH), '') || NULLIF(TRIM(POLICY_EFFECTIVE_DAY), '') AS DATE),
              POLICY_EXPIRATION_DATE = TRY_CAST(NULLIF(TRIM(POLICY_EXPIRATION_YEAR), '') || NULLIF(TRIM(POLICY_EXPIRATION_MONTH), '') || NULLIF(TRIM(POLICY_EXPIRATION_DAY), '') AS DATE),
              CLAIM_STATUS_DESCRIPTION = CASE 
                                              WHEN CLAIM_STATUS = 'op' THEN 'open'
                                              WHEN CLAIM_STATUS = 'cl' THEN 'closed'
                                              WHEN CLAIM_STATUS = 're' THEN 'reopened'
                                              WHEN CLAIM_STATUS = 'vo' THEN 'voided' 
                                              ELSE 'unknown'
                                          END,
              STATUS_DATE = TRY_CAST(NULLIF(TRIM(STATUS_YEAR), '') || NULLIF(TRIM(STATUS_MONTH), '') || NULLIF(TRIM(STATUS_DAY), '') AS DATE),
              CLAIM_DATE = TRY_CAST(NULLIF(TRIM(CLAIM_YEAR), '') || NULLIF(TRIM(CLAIM_MONTH), '') || NULLIF(TRIM(CLAIM_DAY), '') AS DATE),
              EMPLOYER_NOTIFICIATION_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(EMPLOYER_NOTIFICATION_YEAR), '') || NULLIF(TRIM(EMPLOYER_NOTIFICATION_MONTH), '') || NULLIF(TRIM(EMPLOYER_NOTIFICATION_DAY), '') AS DATE), '1900-01-01'::DATE),
              ORIGINAL_OPEN_DATE = TRY_CAST(NULLIF(TRIM(ORIGINAL_OPEN_YEAR), '') || NULLIF(TRIM(ORIGINAL_OPEN_MONTH), '') || NULLIF(TRIM(ORIGINAL_OPEN_DAY), '') AS DATE),
              HIRE_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(HIRE_YEAR), '') || NULLIF(TRIM(HIRE_MONTH), '') || NULLIF(TRIM(HIRE_DAY), '') AS DATE), '1900-01-01'::DATE),
              BIRTH_DATE = TRY_CAST(NULLIF(TRIM(BIRTH_YEAR), '') || NULLIF(TRIM(BIRTH_MONTH), '') || NULLIF(TRIM(BIRTH_DAY), '') AS DATE),
              DEATH_DATE = TRY_CAST(NULLIF(TRIM(DEATH_YEAR), '') || NULLIF(TRIM(DEATH_MONTH), '') || NULLIF(TRIM(DEATH_DAY), '') AS DATE),
              DISABILITY_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(DISABILITY_YEAR), '') || NULLIF(TRIM(DISABILITY_MONTH), '') || NULLIF(TRIM(DISABILITY_DAY), '') AS DATE), '1900-01-01'::DATE),
              RETURN_TO_WORK_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(RETURN_TO_WORK_YEAR), '') || NULLIF(TRIM(RETURN_TO_WORK_MONTH), '') || NULLIF(TRIM(RETURN_TO_WORK_DAY), '') AS DATE), '1900-01-01'::DATE),
              MAX_MEDICAL_IMPROVEMENT_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(MAXIMUM_MEDICAL_IMPROVEMENT_YEAR), '') || NULLIF(TRIM(MAXIMUM_MEDICAL_IMPROVEMENT_MONTH), '') || NULLIF(TRIM(MAXIMUM_MEDICAL_IMPROVEMENT_DAY), '') AS DATE), '1900-01-01'::DATE),
              ATTORNEY_DISCLOSURE_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(ATTORNEY_DISCLOSURE_YEAR), '') || NULLIF(TRIM(ATTORNEY_DISCLOSURE_MONTH), '') || NULLIF(TRIM(ATTORNEY_DISCLOSURE_DAY), '') AS DATE), '1900-01-01'::DATE),
              OCCURRENCE_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(OCCURENCE_YEAR), '') || NULLIF(TRIM(OCCURENCE_MONTH), '') || NULLIF(TRIM(OCCURENCE_DAY), '') AS DATE), '1900-01-01'::DATE),
              DATE_LAST_WORKED = IFNULL(TRY_CAST(NULLIF(TRIM(DATE_LAST_WORKED_YEAR), '') || NULLIF(TRIM(DATE_LAST_WORKED_MONTH), '') || NULLIF(TRIM(DATE_LAST_WORKED_DAY), '') AS DATE), '1900-01-01'::DATE),
              REPORTING_UNIT_ADDRESS = CONCAT(REPORTING_UNITADDRESSLINEONE, REPORTING_UNITADDRESSLINETWO, REPORTING_UNITADDRESSLINETHREE),
              REPORTING_UNIT_ZIPCODE = CASE 
                                          WHEN REPORTING_UNIT_ZIPCODELASTFOURPOSITIONS <> '' THEN CONCAT(REPORTING_UNIT_ZIPCODEFIRSTFIVEPOSITIONS, '-', REPORTING_UNIT_ZIPCODELASTFOURPOSITIONS)
                                          ELSE REPORTING_UNIT_ZIPCODEFIRSTFIVEPOSITIONS 
                                       END,
              DENIAL_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(DENIAL_YEAR), '') || NULLIF(TRIM(DENIAL_MONTH), '') || NULLIF(TRIM(DENIAL_DAY), '') AS DATE), '1900-01-01'::DATE),
              RETURN_TO_WORK_RELEASE_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(RELEASED_RETURN_TO_WORK_YEAR), '') || NULLIF(TRIM(RELEASED_RETURN_TO_WORK_MONTH), '') || NULLIF(TRIM(RELEASED_RETURN_TO_WORK_DAY), '') AS DATE), '1900-01-01'::DATE),
              REPRESENTATION_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(DATE_OF_REPRESENTATION_YEAR), '') || NULLIF(TRIM(DATE_OF_REPRESENTATION_MONTH), '') || NULLIF(TRIM(DATE_OF_REPRESENTATION_DAY), '') AS DATE), '1900-01-01'::DATE),
              SALARY_CONTINUED_START_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(SALARY_CONTINUATION_START_YEAR), '') || NULLIF(TRIM(SALARY_CONTINUATION_START_MONTH), '') || NULLIF(TRIM(SALARY_CONTINUATION_START_DAY), '') AS DATE), '1900-01-01'::DATE),
              SALARY_CONTINUED_END_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(SALARY_CONTINUATION_END_YEAR), '') || NULLIF(TRIM(SALARY_CONTINUATION_END_MONTH), '') || NULLIF(TRIM(SALARY_CONTINUATION_END_DAY), '') AS DATE), '1900-01-01'::DATE),
              RETURN_TO_WORK_FULL_DUTY_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(RETURN_TO_WORK_FULL_DUTY_YEAR), '') || NULLIF(TRIM(RETURN_TO_WORK_FULL_DUTY_MONTH), '') || NULLIF(TRIM(RETURN_TO_WORK_FULL_DUTY_DAY), '') AS DATE), '1900-01-01'::DATE),
              MEDICAL_TO_INDEMNITY_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(MEDICAL_TO_INDEMNITY_YEAR), '') || NULLIF(TRIM(MEDICAL_TO_INDEMNITY_MONTH), '') || NULLIF(TRIM(MEDICAL_TO_INDEMNITY_DAY), '') AS DATE), '1900-01-01'::DATE),
              ACCIDENT_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(ACCIDENT_YEAR), '') || NULLIF(TRIM(ACCIDENT_MONTH), '') || NULLIF(TRIM(ACCIDENT_DAY), '') || ' ' || NULLIF(TRIM(ACCIDENT_HOURS), '') || ':' || NULLIF(TRIM(ACCIDENT_MINUTES), '') AS TIMESTAMP_NTZ), '1900-01-01 00:00:00.000'::TIMESTAMP_NTZ),
              REPORTED_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(REPORTED_YEAR), '') || NULLIF(TRIM(REPORTED_MONTH), '') || NULLIF(TRIM(REPORTED_DAY), '') || ' ' || NULLIF(TRIM(REPORTED_HOURS), '') || ':' || NULLIF(TRIM(REPORTED_MINUTES), '') AS TIMESTAMP_NTZ), '1900-01-01 00:00:00.000'::TIMESTAMP_NTZ),
              REPORT_BASIS_DATE = IFNULL(TRY_CAST(NULLIF(TRIM(REPORTING_BASIS_YEAR), '') || NULLIF(TRIM(REPORTING_BASIS_MONTH), '') || NULLIF(TRIM(REPORTING_BASIS_DAY), '') || ' ' || NULLIF(TRIM(REPORTING_BASIS_HOURS), '') || ':' || NULLIF(TRIM(REPORTING_BASIS_MINUTES), '') AS TIMESTAMP_NTZ), '1900-01-01 00:00:00.000'::TIMESTAMP_NTZ),
              LAST_REVIEW_DATE = IFNULL(TRY_CAST(LEFT(NULLIF(TRIM(LAST_REVIEW_DATE), ''), 8) AS DATE), '1900-01-01'::DATE),
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'spaca_aca_transaction_claim_staging_update';
      END;
    testsEnabled: true
    truncateBefore: false
