  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
          UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_TRANSACTION_THIRD_PARTY_RECOVERY_STAGING
          SET 
              unique_claim_id = CONCAT(client_number, '-', accident_number, '-', claim_coverage_code, '-', claim_sequence_number),
              third_party_recovery_transaction_date = DATE_FROM_PARTS(transaction_year, transaction_month, transaction_day),
              policy_effective_date = CASE 
                  WHEN policy_effective_year = '0000' THEN NULL
                  ELSE DATE_FROM_PARTS(policy_effective_year, policy_effective_month, policy_effective_day)
              END,
              policy_expiration_date = CASE 
                  WHEN policy_expiration_year = '0000' THEN NULL
                  ELSE DATE_FROM_PARTS(policy_expiration_year, policy_expiration_month, policy_expiration_day)
              END,
              recovery_date = DATE_FROM_PARTS(transaction_year, transaction_month, transaction_day),
              recovery_amount1 = CASE 
                  WHEN recovery_amount1 LIKE '%-%' THEN (ABS(recovery_amount1) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount1) / 100)::DECIMAL(16, 2)
              END,
              recovery_amount2 = CASE 
                  WHEN recovery_amount2 LIKE '%-%' THEN (ABS(recovery_amount2) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount2) / 100)::DECIMAL(16, 2)
              END,
              recovery_amount3 = CASE 
                  WHEN recovery_amount3 LIKE '%-%' THEN (ABS(recovery_amount3) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount3) / 100)::DECIMAL(16, 2)
              END,
              recovery_amount4 = CASE 
                  WHEN recovery_amount4 LIKE '%-%' THEN (ABS(recovery_amount4) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount4) / 100)::DECIMAL(16, 2)
              END,
              recovery_amount5 = CASE 
                  WHEN recovery_amount5 LIKE '%-%' THEN (ABS(recovery_amount5) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount5) / 100)::DECIMAL(16, 2)
              END,
              recovery_amount6 = CASE 
                  WHEN recovery_amount6 LIKE '%-%' THEN (ABS(recovery_amount6) / 100)::DECIMAL(16, 2) * -1
                  ELSE (ABS(recovery_amount6) / 100)::DECIMAL(16, 2)
              END,
              aca_date_updated = CURRENT_TIMESTAMP(),
              aca_update_user = 'spaca_aca_transaction_third_party_recovery_staging_update';
      END;
