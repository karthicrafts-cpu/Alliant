    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
        -- SNOWFLAKE MIGRATION FOR DYNAMIC SQL:
        -- This block replicates the logic of the original stored procedure, which dynamically
        -- updates tables based on metadata from ACA_CONTROL_PACKAGE_SOURCE_TABLE.
        -- The variable :iSourceGroupId would need to be supplied during execution (e.g., as a pipeline parameter).
        DECLARE
          iSourceGroupId INTEGER := 1; -- Example value, should be parameterized
          DATABASE_NAME VARCHAR;
          SCHEMA_NAME VARCHAR;
          TABLE_NAME VARCHAR;
          BACKUP_POSTFIX VARCHAR;
          COLUMN_NAME VARCHAR;
          SQL_UPDATE_STMT VARCHAR;
          res RESULTSET DEFAULT (
            SELECT
              "database_name",
              "schema_name",
              "table_name",
              "backup_table_name_postfix",
              "date_column"
            FROM
              ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_CONTROL_PACKAGE_SOURCE_TABLE
            WHERE
              "source_group_id" = :iSourceGroupId
          );
          cur_tables CURSOR FOR res;
        BEGIN
          FOR rec IN cur_tables DO DATABASE_NAME := rec."database_name";
          SCHEMA_NAME := rec."schema_name";
          TABLE_NAME := rec."table_name";
          BACKUP_POSTFIX := rec."backup_table_name_postfix";
          COLUMN_NAME := rec."date_column";
          LET fq_target_table := IDENTIFIER(
            :DATABASE_NAME || '.' || :SCHEMA_NAME || '.' || :TABLE_NAME
          );
          LET fq_backup_table := IDENTIFIER(
            :DATABASE_NAME || '.' || :SCHEMA_NAME || '.' || :TABLE_NAME || :BACKUP_POSTFIX
          );
          LET update_col := IDENTIFIER(:COLUMN_NAME);
          LET join_key_col := IDENTIFIER(:TABLE_NAME || '_id');
          SQL_UPDATE_STMT := 'UPDATE ' || :fq_target_table || ' AS t ' || 'SET t.' || :update_col || ' = b.' || :update_col || ' ' || 'FROM ' || :fq_backup_table || ' AS b ' || 'WHERE b.' || :join_key_col || ' = t.' || :join_key_col || ';';
          EXECUTE IMMEDIATE :SQL_UPDATE_STMT;
        END FOR;
        RETURN 'Dynamic updates completed.';
      END;
      END;
