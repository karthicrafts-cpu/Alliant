operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;

      UPDATE ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_EXPERIENCE_TRANSACTION_STAGING_GB T
      SET
          T.ACA_CLAIM_ID = SOURCE.NEW_ACA_CLAIM_ID,
          T.ACA_POLICY_ID = SOURCE.NEW_ACA_POLICY_ID,
          T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          T.ACA_UPDATE_USER = 'spaca_aca_experience_transaction_staging_gb_update'
      FROM (
          SELECT
              T_INNER.SOURCE_SYSTEM_CLAIM_ID,
              T_INNER.SOURCE_SYSTEM_POLICY_ID,
              IFNULL(C.ACA_CLAIM_ID, -1) AS NEW_ACA_CLAIM_ID,
              IFNULL(PO.ACA_POLICY_ID, -1) AS NEW_ACA_POLICY_ID
          FROM ALLIANT_CLAIMS_ASTRUS_STAGE.DBO.ACA_EXPERIENCE_TRANSACTION_STAGING_GB AS T_INNER
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS C ON C.SOURCE_SYSTEM_CLAIM_ID = T_INNER.SOURCE_SYSTEM_CLAIM_ID
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY AS PO ON PO.SOURCE_SYSTEM_POLICY_ID = T_INNER.SOURCE_SYSTEM_POLICY_ID
      ) AS SOURCE
      WHERE
          EQUAL_NULL(T.SOURCE_SYSTEM_CLAIM_ID, SOURCE.SOURCE_SYSTEM_CLAIM_ID)
          AND EQUAL_NULL(T.SOURCE_SYSTEM_POLICY_ID, SOURCE.SOURCE_SYSTEM_POLICY_ID);
      END;
    testsEnabled: true
    truncateBefore: false
