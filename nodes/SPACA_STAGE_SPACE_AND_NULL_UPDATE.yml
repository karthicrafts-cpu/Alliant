    postSQL: |-
      USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
      BEGIN
        LET SQL VARCHAR;
        LET TableName VARCHAR := {{ parameters.TableName }};

        SELECT 'UPDATE ' || COALESCE(TableName, '') || ' SET ' || LISTAGG('"' || COLUMN_NAME || '" = TRIM("' || COLUMN_NAME || '")', ', ')
        INTO :SQL
        FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_INFORMATION_SCHEMA', 'COLUMNS') }}
        WHERE TABLE_NAME = TableName
          AND DATA_TYPE IN ('text', 'ntext', 'varchar', 'char', 'nvarchar', 'nchar');

        IF (:SQL IS NOT NULL AND :SQL != 'BEGIN  END;') THEN EXECUTE IMMEDIATE :SQL; END IF;

        SELECT 'UPDATE ' || COALESCE(TableName, '') || ' SET ' || LISTAGG('"' || COLUMN_NAME || '" = IFF(LENGTH("' || COLUMN_NAME || '") = 0, NULL, "' || COLUMN_NAME || '")', ', ')
        INTO :SQL
        FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_INFORMATION_SCHEMA', 'COLUMNS') }}
        WHERE TABLE_NAME = TableName
          AND DATA_TYPE IN ('text', 'ntext', 'varchar', 'char', 'nvarchar', 'nchar');

        IF (:SQL IS NOT NULL AND :SQL != 'BEGIN  END;') THEN EXECUTE IMMEDIATE :SQL; END IF;

        SELECT 'UPDATE ' || COALESCE(TableName, '') || ' SET ' || LISTAGG('"' || COLUMN_NAME || '" = IFF("' || COLUMN_NAME || '" = ''NULL'', NULL, "' || COLUMN_NAME || '")', ', ')
        INTO :SQL
        FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_INFORMATION_SCHEMA', 'COLUMNS') }}
        WHERE TABLE_NAME = TableName
          AND DATA_TYPE IN ('text', 'ntext', 'varchar', 'char', 'nvarchar', 'nchar');

        IF (:SQL IS NOT NULL AND :SQL != 'BEGIN  END;') THEN EXECUTE IMMEDIATE :SQL; END IF;
      END;
