fileVersion: 1
id: 57467652-3d7f-4b07-9b2f-762330a6c6e1
name: ACA_CLAIM
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_CLAIMS_ASTRUS;

      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIM AS c
      SET
          ACA_DATE_ID_CLAIM_DATE = stg.ACA_DATE_ID_CLAIM_DATE,
          ACA_DATE_ID_ORIGINAL_OPEN_DATE = stg.ACA_DATE_ID_ORIGINAL_OPEN_DATE,
          ACA_ACCOUNT_STRUCTURE_ID = stg.ACA_ACCOUNT_STRUCTURE_ID,
          CLAIM_SEQUENCE_NUMBER = stg.CLAIM_SEQUENCE_NUMBER,
          ACCIDENT_NUMBER = stg.ACCIDENT_NUMBER,
          CLIENT_NUMBER = stg.CLIENT_NUMBER,
          UNIT_ID = stg.UNIT_ID,
          SITE_NUMBER = stg.SITE_NUMBER,
          EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED = stg.EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED,
          EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED = stg.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED,
          CLAIM_DATE = stg.CLAIM_DATE,
          ORIGINAL_OPEN_DATE = stg.ORIGINAL_OPEN_DATE,
          DEATH_DATE_ENCRYPTED = stg.DEATH_DATE_ENCRYPTED,
          PRODUCT_NAME = stg.PRODUCT_NAME,
          NCCI_ACT = stg.NCCI_ACT,
          SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT = stg.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT,
          CLAIM_COVERAGE_CODE = stg.CLAIM_COVERAGE_CODE,
          ACCIDENT_CAUSE_CODE = stg.ACCIDENT_CAUSE_CODE,
          ACCIDENT_COUNTRY_CODE = stg.ACCIDENT_COUNTRY_CODE,
          BENEFIT_JURISDICTION_COUNTRY_CODE = stg.BENEFIT_JURISdiction_country_code,
          SIC_CODE = stg.SIC_CODE,
          CLIENT_OPTIONAL_ACCIDENT_CODE = stg.CLIENT_OPTIONAL_ACCIDENT_CODE,
          LOSS_CLAIMANT_SEQUENCE_NUMBER = stg.LOSS_CLAIMANT_SEQUENCE_NUMBER,
          LOSS_CLIENT_NUMBER = stg.LOSS_CLIENT_NUMBER,
          LOSS_REFERENCE_NUMBER = stg.LOSS_REFERENCE_NUMBER,
          LOSS_TRADING_PARTNER_CODE = stg.LOSS_TRADING_PARTNER_CODE,
          LOSS_TRADING_PARTNER_CODE_TYPE = stg.LOSS_TRADING_PARTNER_CODE_TYPE,
          COMPANION_ACCIDENT_NUMBER = stg.COMPANION_ACCIDENT_NUMBER,
          COMPANION_COVERAGE_CODE = stg.COMPANION_COVERAGE_CODE,
          COMPANION_COVERAGE_SEQUENCE_NUMBER = stg.COMPANION_COVERAGE_SEQUENCE_NUMBER,
          SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID = stg.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID,
          ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          ACA_UPDATE_USER = 'spaca_aca_claim_gb_insertUpdate'
      FROM {{ ref('DBSHIFT', 'ACA_CLAIM_STAGING_GB') }} AS stg
      WHERE c.SOURCE_SYSTEM_CLAIM_ID = stg.SOURCE_SYSTEM_CLAIM_ID
        AND c.ACA_SOURCE_SYSTEM_ID = stg.ACA_SOURCE_SYSTEM_ID
        AND c.ACA_CLAIM_ID <> -1
        AND c.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
        AND (
          IFNULL(c.ACA_DATE_ID_CLAIM_DATE, '') <> IFNULL(stg.ACA_DATE_ID_CLAIM_DATE, '') OR
          IFNULL(c.ACA_DATE_ID_ORIGINAL_OPEN_DATE, '') <> IFNULL(stg.ACA_DATE_ID_ORIGINAL_OPEN_DATE, '') OR
          IFNULL(c.ACA_ACCOUNT_STRUCTURE_ID, '') <> IFNULL(stg.ACA_ACCOUNT_STRUCTURE_ID, '') OR
          IFNULL(c.CLAIM_SEQUENCE_NUMBER, '') <> IFNULL(stg.CLAIM_SEQUENCE_NUMBER, '') OR
          IFNULL(c.ACCIDENT_NUMBER, '') <> IFNULL(stg.ACCIDENT_NUMBER, '') OR
          IFNULL(c.CLIENT_NUMBER, '') <> IFNULL(stg.CLIENT_NUMBER, '') OR
          IFNULL(c.UNIT_ID, '') <> IFNULL(stg.UNIT_ID, '') OR
          IFNULL(c.SITE_NUMBER, '') <> IFNULL(stg.SITE_NUMBER, '') OR
          IFNULL(c.EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED, TO_BINARY('', 'HEX')) <> IFNULL(stg.EMPLOYEE_IDENTIFICATION_NUMBER_ENCRYPTED, TO_BINARY('', 'HEX')) OR
          IFNULL(c.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED, TO_BINARY('', 'HEX')) <> IFNULL(stg.EMPLOYER_FEDERAL_TAX_IDENTIFICATION_NUMBER_ENCRYPTED, TO_BINARY('', 'HEX')) OR
          IFNULL(c.CLAIM_DATE, '1900-01-01'::DATE) <> IFNULL(stg.CLAIM_DATE, '1900-01-01'::DATE) OR
          IFNULL(c.ORIGINAL_OPEN_DATE, '1900-01-01'::DATE) <> IFNULL(stg.ORIGINAL_OPEN_DATE, '1900-01-01'::DATE) OR
          IFNULL(c.DEATH_DATE_ENCRYPTED, TO_BINARY('', 'HEX')) <> IFNULL(stg.DEATH_DATE_ENCRYPTED, TO_BINARY('', 'HEX')) OR
          IFNULL(c.PRODUCT_NAME, '') <> IFNULL(stg.PRODUCT_NAME, '') OR
          IFNULL(c.NCCI_ACT, '') <> IFNULL(stg.NCCI_ACT, '') OR
          IFNULL(c.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT, 0) <> IFNULL(stg.SOCIAL_SECURITY_OR_OTHER_OFFSET_AMOUNT, 0) OR
          IFNULL(c.CLAIM_COVERAGE_CODE, '') <> IFNULL(stg.CLAIM_COVERAGE_CODE, '') OR
          IFNULL(c.ACCIDENT_CAUSE_CODE, '') <> IFNULL(stg.ACCIDENT_CAUSE_CODE, '') OR
          IFNULL(c.ACCIDENT_COUNTRY_CODE, '') <> IFNULL(stg.ACCIDENT_COUNTRY_CODE, '') OR
          IFNULL(c.BENEFIT_JURISDICTION_COUNTRY_CODE, '') <> IFNULL(stg.BENEFIT_JURISDICTION_COUNTRY_CODE, '') OR
          IFNULL(c.SIC_CODE, '') <> IFNULL(stg.SIC_CODE, '') OR
          IFNULL(c.CLIENT_OPTIONAL_ACCIDENT_CODE, '') <> IFNULL(stg.CLIENT_OPTIONAL_ACCIDENT_CODE, '') OR
          IFNULL(c.LOSS_CLAIMANT_SEQUENCE_NUMBER, '') <> IFNULL(stg.LOSS_CLAIMANT_SEQUENCE_NUMBER, '') OR
          IFNULL(c.LOSS_CLIENT_NUMBER, '') <> IFNULL(stg.LOSS_CLIENT_NUMBER, '') OR
          IFNULL(c.LOSS_REFERENCE_NUMBER, '') <> IFNULL(stg.LOSS_REFERENCE_NUMBER, '') OR
          IFNULL(c.LOSS_TRADING_PARTNER_CODE, '') <> IFNULL(stg.LOSS_TRADING_PARTNER_CODE, '') OR
          IFNULL(c.LOSS_TRADING_PARTNER_CODE_TYPE, '') <> IFNULL(stg.LOSS_TRADING_PARTNER_CODE_TYPE, '') OR
          IFNULL(c.COMPANION_ACCIDENT_NUMBER, '') <> IFNULL(stg.COMPANION_ACCIDENT_NUMBER, '') OR
          IFNULL(c.COMPANION_COVERAGE_CODE, '') <> IFNULL(stg.COMPANION_COVERAGE_CODE, '') OR
          IFNULL(c.COMPANION_COVERAGE_SEQUENCE_NUMBER, '') <> IFNULL(stg.COMPANION_COVERAGE_SEQUENCE_NUMBER, '') OR
          IFNULL(c.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID, TO_BINARY('', 'HEX')) <> IFNULL(stg.SOURCE_SYSTEM_ACCOUNT_STRUCTURE_ID, TO_BINARY('', 'HEX'))
        );

      END;
