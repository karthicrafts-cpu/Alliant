name: PSTG_SPACA_ACA_ACCOUNT_STRUCTURE_STAGING_ESIS_UPDATE
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN

        LET proc_name VARCHAR(100) := 'spaca_aca_account_structure_staging_esis_update';
        LET current_timestamp TIMESTAMP_NTZ := CURRENT_TIMESTAMP();
        LET source_system VARCHAR(25) := 'ESIS';
        LET aca_source_system_id NUMBER(10,0);

        SELECT ACA_SOURCE_SYSTEM_ID INTO :aca_source_system_id
        FROM {{ ref('SRC-ASTRUS', 'ACA_SOURCE_SYSTEM') }}
        WHERE SOURCE_SYSTEM = :source_system;

        UPDATE {{ ref('SRC-ASTRUS', 'ACA_ACCOUNT_STRUCTURE_STAGING_ESIS') }} AS TGT
        SET 
            aca_source_system_id = :aca_source_system_id,
       
          aca_account_structure_id = COALESCE(ac.aca_account_structure_id, -1),
       
          aca_date_id_claim_date = COALESCE(
              TRY_CAST(TO_CHAR(e.claim_date, 'YYYYMMDD') AS INT), -1
          ),
       
          aca_date_id_original_open_date = COALESCE(
              TRY_CAST(TO_CHAR(e.original_open_date, 'YYYYMMDD') AS INT), -1
          ),
       
          -- Encryption: Snowflake uses ENCRYPT() — store as VARCHAR/BINARY
          employee_identification_number_encrypted = COALESCE(
              e.employee_identification_number_encrypted,
              ENCRYPT(e.employee_identification_number, :encryption_key)
          ),
       
          employer_federal_tax_identification_number_encrypted = COALESCE(
              e.employer_federal_tax_identification_number_encrypted,
              ENCRYPT(e.employer_federal_tax_identification_number, :encryption_key)
          ),
       
          death_date_encrypted = COALESCE(
              e.death_date_encrypted,
              ENCRYPT(TO_VARCHAR(e.death_date), :encryption_key)
          ),
       
          -- Null out PII columns after encryption
          employee_identification_number = NULL,
          employer_federal_tax_identification_number = NULL,
          death_date = NULL,
       
          aca_date_updated = CURRENT_TIMESTAMP(),
          aca_update_user = 'spaca_aca_claim_staging_esis_update'
       
      FROM (
          SELECT 
              e.ACA_CLAIM_STAGING_ESIS_ID,   -- primary key to match update target
              COALESCE(ac.aca_account_structure_id, -1) AS aca_account_structure_id
          FROM AUS_DEV_RAW.SNAPSHOT.ACA_CLAIM_STAGING_ESIS e
          LEFT JOIN ALLIANT_CLAIMS_ASTRUS.DBO.ACA_ACCOUNT_STRUCTURE ac
              ON  e.source_system_account_structure_id = ac.source_system_account_structure_id
              AND ac.aca_source_system_id = :aca_source_system_id
      ) ac
      WHERE e.ACA_CLAIM_STAGING_ESIS_ID = ac.ACA_CLAIM_STAGING_ESIS_ID;
      END;
    testsEnabled: true
    truncateBefore: false
