fileVersion: 1
id: 5970c9d9-29c8-47bb-a1a7-f9d273a5585b
name: ACA_CLAIMANT_GB
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE ALLIANT_CLAIMS_ASTRUS_STAGE;
          UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_CLAIMANT_GB AS c
          SET 
              ACA_EMPLOYMENT_STATUS_ID = b.ACA_EMPLOYMENT_STATUS_ID,
              ACA_MARITAL_STATUS_ID = b.ACA_MARITAL_STATUS_ID,
              ADDRESS_ENCRYPTED = b.ADDRESS_ENCRYPTED,
              CITY = b.CITY,
              STATE_CODE = b.STATE_CODE,
              COUNTRY_CODE = b.COUNTRY_CODE,
              ZIP_CODE = b.ZIP_CODE,
              AGE = b.AGE,
              GENDER = b.GENDER,
              AVERAGE_WEEKLY_WAGE = b.AVERAGE_WEEKLY_WAGE,
              NCCI_JOB_CLASSIFICATION_CODE = b.NCCI_JOB_CLASSIFICATION_CODE,
              LENGTH_OF_SERVICE_IN_YEAR = b.LENGTH_OF_SERVICE_IN_YEAR,
              PHONE_ENCRYPTED = b.PHONE_ENCRYPTED,
              HIRE_DATE = b.HIRE_DATE,
              EMPLOYMENT_STATUS_CODE = b.EMPLOYMENT_STATUS_CODE,
              EMPLOYMENT_STATUS = b.EMPLOYMENT_STATUS,
              BIRTH_DATE = b.BIRTH_DATE,
              MARITAL_STATUS_CODE = b.MARITAL_STATUS_CODE,
              MARITAL_STATUS = b.MARITAL_STATUS,
              OCCUPATION = b.OCCUPATION,
              EMPLOYEE_NUMBER = b.EMPLOYEE_NUMBER,
              ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
              ACA_UPDATE_USER = 'dbo.spaca_aca_claimant_gb_insertUpdate'
          FROM 
              {{ ref('DBSHIFT', 'ACA_CLAIMANT_STAGING_GB') }} AS b
          WHERE 
              c.SOURCE_SYSTEM_CLAIMANT_ID = b.SOURCE_SYSTEM_CLAIMANT_ID
              AND c.ACA_SOURCE_SYSTEM_ID = b.ACA_SOURCE_SYSTEM_ID
              AND c.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
              AND (
                  IFNULL(b.ACA_EMPLOYMENT_STATUS_ID, -1) <> IFNULL(c.ACA_EMPLOYMENT_STATUS_ID, -1)
                  OR IFNULL(b.ACA_MARITAL_STATUS_ID, -1) <> IFNULL(c.ACA_MARITAL_STATUS_ID, -1)
                  OR IFNULL(b.ADDRESS_ENCRYPTED, ''::VARBINARY) <> IFNULL(c.ADDRESS_ENCRYPTED, ''::VARBINARY)
                  OR IFNULL(b.CITY, '') <> IFNULL(c.CITY, '')
                  OR IFNULL(b.STATE_CODE, '') <> IFNULL(c.STATE_CODE, '')
                  OR IFNULL(b.COUNTRY_CODE, '') <> IFNULL(c.COUNTRY_CODE, '')
                  OR IFNULL(b.ZIP_CODE, '') <> IFNULL(c.ZIP_CODE, '')
                  OR IFNULL(b.AGE, 0) <> IFNULL(c.AGE, 0)
                  OR IFNULL(b.GENDER, '') <> IFNULL(c.GENDER, '')
                  OR IFNULL(b.AVERAGE_WEEKLY_WAGE, 0.00) <> IFNULL(c.AVERAGE_WEEKLY_WAGE, 0.00)
                  OR IFNULL(b.NCCI_JOB_CLASSIFICATION_CODE, '') <> IFNULL(c.NCCI_JOB_CLASSIFICATION_CODE, '')
                  OR IFNULL(b.LENGTH_OF_SERVICE_IN_YEAR, 0) <> IFNULL(c.LENGTH_OF_SERVICE_IN_YEAR, 0)
                  OR IFNULL(b.PHONE_ENCRYPTED, ''::VARBINARY) <> IFNULL(c.PHONE_ENCRYPTED, ''::VARBINARY)
                  OR IFNULL(b.HIRE_DATE, '1776-07-04'::DATE) <> IFNULL(c.HIRE_DATE, '1776-07-04'::DATE)
                  OR IFNULL(b.EMPLOYMENT_STATUS_CODE, '') <> IFNULL(c.EMPLOYMENT_STATUS_CODE, '')
                  OR IFNULL(b.EMPLOYMENT_STATUS, '') <> IFNULL(c.EMPLOYMENT_STATUS, '')
                  OR IFNULL(b.BIRTH_DATE, '1776-07-04'::DATE) <> IFNULL(c.BIRTH_DATE, '1776-07-04'::DATE)
                  OR IFNULL(b.MARITAL_STATUS_CODE, '') <> IFNULL(c.MARITAL_STATUS_CODE, '')
                  OR IFNULL(b.MARITAL_STATUS, '') <> IFNULL(c.MARITAL_STATUS, '')
                  OR IFNULL(b.OCCUPATION, '') <> IFNULL(c.OCCUPATION, '')
                  OR IFNULL(b.EMPLOYEE_NUMBER, '') <> IFNULL(c.EMPLOYEE_NUMBER, '')
              );
      END;
