name: DIM_AGENT
operation:
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE YOUR_DB;\n-- Soft delete records that are no longer in the source\nUPDATE YOUR_DB.DBO.DIM_AGENT AS t\nSET\n    DW_IS_CURRENT = 'N',\n    DW_DATE_DELETED = CURRENT_TIMESTAMP()\nWHERE t.DW_IS_CURRENT = 'Y'\n  AND NOT EXISTS (\n    SELECT 1\n    FROM {{ ref('DBSHIFT', 'STG_AGENT') }} AS s\n    WHERE s.AGENT_ID = t.AGENT_ID\n  );\nEND;"
    preSQL: "BEGIN\nUSE DATABASE YOUR_DB;\n-- Update existing records that have changed\nUPDATE YOUR_DB.DBO.DIM_AGENT AS t\nSET \n    DW_DATE_DELETED = CURRENT_TIMESTAMP(),\n    DW_IS_CURRENT = 'N'\nFROM {{ ref('DBSHIFT', 'STG_AGENT') }} AS s\nWHERE t.AGENT_ID = s.AGENT_ID\n  AND t.DW_IS_CURRENT = 'Y'\n  AND t.HASH_VALUE <> s.HASH_VALUE;\nEND;"
    testsEnabled: true
    truncateBefore: false
  database: AUS_DEV_CURATED
